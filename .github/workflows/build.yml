name: SVG 高清图标自动转换编译

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      # 解决 Node.js 24 的警告问题
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          # 关闭缓存功能，防止因为找不到 go.sum 报错
          cache: false

      - name: 自动化图标工厂 (SVG -> 高清 ICO)
        # 确保 icons 目录存在，并转换 SVG
        run: |
          if (!(Test-Path "icons")) { New-Item -ItemType Directory -Path "icons" }
          magick -background none -density 1024 icons/app.svg -define icon:auto-resize=256,128,64,48,32,16 icons/app.ico

      - name: 生成资源定义
        # 使用简单的输出方式，确保 main.rc 的内容正确
        run: |
          "1 ICON `"icons/app.ico`"" | Out-File -FilePath main.rc -Encoding ascii
          "1 24 `"app.manifest`"" | Out-File -FilePath main.rc -Append -Encoding ascii

      - name: 编译资源文件
        # windres 会将 main.rc 编译为 main.syso
        run: windres -i main.rc -o main.syso -O coff

      - name: 准备 Go 模块
        # 这一步会生成 go.sum，解决之前的依赖报错
        run: |
          go mod tidy

      - name: 编译 EXE
        # ldflags 去掉黑窗口，-o 指定输出名称
        run: go build -ldflags="-s -w -H=windowsgui" -o bing-tool.exe

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: BingTool_Fixed_HD
          path: bing-tool.exe
