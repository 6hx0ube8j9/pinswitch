name: 修复快捷方式高清图标

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: 安装图标工具
        run: go install github.com/akavel/rsrc@latest

      - name: 生成标准资源
        run: |
          go mod init webgo || echo "exists"
          go get github.com/energye/systray@latest
          go get github.com/pkg/browser@latest

          # 核心修正：使用 -ico 注入时，rsrc 会自动将其设为 ID 1 (默认图标)
          # 同时生成一个清单文件，确保 Shell 能够以高 DPI 模式读取它
          echo '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><assembly xmlns="urn:schemas-microsoft-com:asm.v1" manifestVersion="1.0"><assemblyIdentity version="1.0.0.0" processorArchitecture="*" name="BingTool" type="win32"/><description>Bing Tool</description></assembly>' > app.manifest

          rsrc -arch amd64 -ico icons/app.ico -manifest app.manifest -o resource.syso
          
          go mod tidy

      - name: 编译 EXE
        # 重要：必须直接 go build，不要指定 main.go
        run: go build -ldflags="-s -w -H=windowsgui" -o bing-tool.exe

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: BingTool_Fixed_Icon
          path: bing-tool.exe
