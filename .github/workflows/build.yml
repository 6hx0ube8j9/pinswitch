on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境与缓存
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true  

      - name: 安装 go-winres 工具
        run: |
          go install github.com/tc-hib/go-winres@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
        shell: bash

      - name: 自动整理依赖与强行注入图标
        run: |
          # 如果云端没有 go.mod，自动初始化
          if [ ! -f "go.mod" ]; then
            go mod init webgo
          fi

          # 🌟 标准强行注入：直接将指定图标编译为标准的 syso 资源文件
          # 这样 Go 编译器在下一步打包时，会自动将其百分之百锁进 .exe 内部
          go-winres simply --icon icons/app.ico
          
          # 整理依赖
          go mod tidy
        shell: bash

      - name: 编译 EXE 核心
        run: |
          # 编译成无 CMD 窗口的程序
          go build -ldflags="-H=windowsgui" -o bing-tool.exe

      - name: 发布成品
        uses: actions/upload-artifact@v4
        with:
          name: bing-final-tool
          path: bing-tool.exe
