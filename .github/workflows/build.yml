name: 强制注入文件图标

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: 安装 windres 工具
        run: |
          go install github.com/akavel/rsrc@latest

      - name: 执行资源注入
        run: |
          go mod init webgo || echo "exists"
          go get github.com/energye/systray@latest
          go get github.com/pkg/browser@latest
          
          # 使用 rsrc 直接把图标转换成编译器能识别的对象文件
          rsrc -arch amd64 -ico icons/app.ico -o main.syso
          
          go mod tidy

      - name: 编译 EXE
        run: go build -ldflags="-s -w -H=windowsgui" -o bing-tool.exe

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: bing-final-version
          path: bing-tool.exe
