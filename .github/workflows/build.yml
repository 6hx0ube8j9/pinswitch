on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境与缓存
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true  

      - name: 安装 go-winres 工具
        run: |
          go install github.com/tc-hib/go-winres@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
        shell: bash

      - name: 自动整理依赖与强行注入图标
        run: |
          if [ ! -f "go.mod" ]; then
            go mod init webgo
          fi
          # 提取标准 ico 里的各尺寸图层，无视任何格式兼容问题
          go-winres simply --icon icons/app.ico
          go mod tidy
        shell: bash

      - name: 编译 EXE 核心
        run: |
          go build -ldflags="-H=windowsgui" -o bing-tool.exe

      - name: 发布成品
        uses: actions/upload-artifact@v4
        with:
          name: bing-final-tool
          path: bing-tool.exe
