on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境与缓存
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true  

      - name: 安装 go-winres 工具
        run: |
          # 🌟 修正：正确的现代主流工具仓库路径 (tc-hib)
          go install github.com/tc-hib/go-winres@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
        shell: bash

      - name: 自动整理依赖与注入图标
        run: |
          # 🌟 修正：使用标准的 simply 命令直接指定图标路径
          go-winres simply --icon icons/app.ico
          
          # 整理 go 依赖
          go mod tidy
        shell: bash

      - name: 编译 EXE 核心
        run: |
          # 编译成无 CMD 窗口的程序
          go build -ldflags="-H=windowsgui" -o bing-tool.exe

      - name: 发布成品
        uses: actions/upload-artifact@v4
        with:
          name: bing-final-tool
          path: bing-tool.exe
