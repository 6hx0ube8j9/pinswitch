name: Build IME Switcher

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install dependencies
        shell: pwsh
        run: |
          go mod tidy

      - name: Install and Run go-winres (Resource Compiler)
        shell: pwsh
        run: |
          go install github.com/tc-hib/go-winres@latest
          $GOBIN = "$(go env GOPATH)\bin"
          
          if (Test-Path "icons/app.ico") {
            & "$GOBIN\go-winres.exe" simply --icon icons/app.ico
          } else {
            Write-Error "找不到图标文件 icons/app.ico"
            exit 1
          }

      - name: Build EXE
        shell: pwsh
        run: |
          $env:CGO_ENABLED="0"
          $env:GOOS="windows"
          $env:GOARCH="amd64"          
          
          go build -ldflags="-s -w -H=windowsgui" -o ime-switcher.exe .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ime-switcher
          path: ime-switcher.exe
