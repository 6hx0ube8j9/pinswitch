on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境与缓存
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true  

      - name: 安装图标注入工具
        run: |
          go install github.com/akavel/rsrc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
        shell: bash

      - name: 自动整理依赖与注入图标
        run: |
          # 在云端实时将你的 icons/app.ico 转为 main.syso
          rsrc -arch amd64 -ico icons/app.ico -o main.syso
          go mod tidy
        shell: bash

      - name: 编译 EXE 核心
        run: |
          go build -ldflags="-H=windowsgui" -o bing-tool.exe

      - name: 发布成品
        uses: actions/upload-artifact@v4
        with:
          name: bing-final-tool
          path: bing-tool.exe
