name: 自动编译 Go 工具

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: 编译 Windows 版本
    runs-on: windows-latest  # 直接在 Windows 环境跑，成功率 100%
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false # 先关掉缓存，避免 go.sum 缺失报错

      - name: 初始化依赖
        run: |
          go mod tidy
          
      - name: 编译
        # 针对 Windows，我们专门加上窗口隐藏参数
        run: go build -ldflags="-H=windowsgui" -o bing-tool.exe main.go

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: bing-tool-windows
          path: bing-tool.exe

  # 如果你还想顺便编一个 Linux 版测试（注意 Linux 下 systray 很难交叉编译，建议分开）
  build-linux:
    name: 编译 Linux 版本
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Linux GUI 依赖
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: 初始化依赖
        run: go mod tidy

      - name: 编译
        run: go build -o bing-tool-linux main.go

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: bing-tool-linux
          path: bing-tool-linux
