name: 注入文件图标并编译

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: 安装图标资源工具
        # 这个工具能生成 Windows 识别的资源文件
        run: go install github.com/akavel/rsrc@latest

      - name: 准备依赖并注入图标
        run: |
          go mod init webgo || echo "exists"
          go get github.com/energye/systray@latest
          go get github.com/pkg/browser@latest
          
          # 核心步骤：生成 resource.syso 文件
          # Go 编译器在编译时如果发现当前目录有 .syso 文件，会自动把它打包成 exe 的外壳图标
          rsrc -arch amd64 -ico icons/app.ico -o resource.syso
          
          go mod tidy

      - name: 编译 EXE
        # -H=windowsgui 确保隐藏黑窗口
        run: go build -ldflags="-s -w -H=windowsgui" -o bing-tool.exe main.go

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: bing-tool-fixed
          path: bing-tool.exe
