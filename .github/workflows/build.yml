name: 编译Windows测试版

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 解决依赖
        run: |
          go mod init github.com/user/webgo || format-table  # 如果没初始化则初始化
          go get github.com/getlantern/systray
          go get github.com/pkg/browser
          go mod tidy

      - name: 编译 EXE
        # 这里先去掉 -H=windowsgui，方便报错时能看到弹窗提示
        run: go build -o bing-tool-test.exe main.go

      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-build
          path: bing-tool-test.exe
