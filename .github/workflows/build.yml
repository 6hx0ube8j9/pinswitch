name: Build Launcher

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable' 
          cache: true   

      - name: Install dependencies
        shell: pwsh
        run: |
          if (!(Test-Path "go.mod")) { go mod init mihomo-launcher }
          go get github.com/energye/systray@latest
          go get github.com/pkg/browser@latest
          go mod tidy

      - name: Install and Run go-winres
        shell: pwsh
        run: |
          go install github.com/tc-hib/go-winres@latest
          $GOBIN = "$(go env GOPATH)\bin"
          if (Test-Path "icons/app.ico") {
            & "$GOBIN\go-winres.exe" simply --icon icons/app.ico
          } else {
            exit 1
          }

      - name: Build EXE
        shell: pwsh
        run: |
          $env:CGO_ENABLED="1"
          go build -ldflags="-s -w -H=windowsgui" -o mihomo-launcher.exe .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-launcher
          path: mihomo-launcher.exe
