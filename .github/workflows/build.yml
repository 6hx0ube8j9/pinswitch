name: 编译带完整图标版本

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: 安装图标生成工具
        # rsrc 工具专门负责将 .ico 注入 .exe 文件本身
        run: go install github.com/akavel/rsrc@latest

      - name: 生成资源文件并整理依赖
        run: |
          go mod init webgo || echo "exists"
          go get github.com/energye/systray@latest
          go get github.com/pkg/browser@latest
          
          # 核心：这一步生成 resource.syso，Go 编译器会自动识别它并设为文件图标
          rsrc -arch amd64 -ico icons/app.ico -o resource.syso
          
          go mod tidy

      - name: 编译 EXE
        # -H=windowsgui 确保隐藏黑窗口，且不显示任务栏图标
        run: go build -ldflags="-s -w -H=windowsgui" -o bing-tool.exe main.go

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: bing-tool-final
          path: bing-tool.exe
