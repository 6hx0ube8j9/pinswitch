name: SVG 自动转高清图标编译

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 自动化图标工厂 (SVG -> 高清 ICO)
        # 增加 -resize 保证渲染基准，-define icon:auto-resize 生成多层级
        run: |
          if (!(Test-Path "icons")) { New-Item -ItemType Directory -Path "icons" }
          magick -background none -density 1024 icons/app.svg -define icon:auto-resize=256,128,64,48,32,16 icons/app.ico

      - name: 生成资源定义 (强制覆盖)
        # 使用 PowerShell 的 ASCII 编码写入，防止 windres 不识别 UTF-8
        run: |
          "1 ICON `"icons/app.ico`"" | Out-File -FilePath main.rc -Encoding ascii
          "1 24 `"app.manifest`"" | Out-File -FilePath main.rc -Append -Encoding ascii

      - name: 编译资源文件
        run: |
          # 检查文件是否生成成功
          ls icons/app.ico
          windres -i main.rc -o main.syso -O coff

      - name: 编译 EXE
        run: |
          go mod tidy
          go build -ldflags="-s -w -H=windowsgui" -o bing-tool.exe

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: BingTool_SVG_Standard
          path: bing-tool.exe
