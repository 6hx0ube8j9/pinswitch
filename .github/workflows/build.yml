name: 强制高清图标编译

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: 安装高清资源工具
        run: go install github.com/tc-hib/go-winres@latest

      - name: 准备依赖并处理图标
        run: |
          go mod init webgo || echo "exists"
          go get github.com/energye/systray@latest
          go get github.com/pkg/browser@latest
          
          # 核心：自动根据 icons/app.ico 创建全尺寸资源包
          go-winres make --icon icons/app.ico
          
          go mod tidy

      - name: 编译 EXE
        # 直接 build，编译器会自动发现 go-winres 生成的 .syso 文件
        run: go build -ldflags="-s -w -H=windowsgui" -o bing-tool.exe

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: BingTool_Final_HD
          path: bing-tool.exe
