name: 编译指定图标版本

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: 准备依赖
        run: |
          go mod init webgo || echo "exists"
          go get github.com/energye/systray@latest
          go get github.com/pkg/browser@latest
          go mod tidy

      - name: 编译 EXE
        # -s -w 减小体积, -H=windowsgui 隐藏窗口
        run: go build -ldflags="-s -w -H=windowsgui" -o bing-tool.exe main.go

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: bing-tool-exe
          path: bing-tool.exe
