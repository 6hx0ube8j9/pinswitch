name: 极简小工具自动化编译

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境与缓存
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true  

      - name: 自动整理依赖
        run: |
          go mod tidy

      - name: 编译 EXE 核心
        run: |
          go build -ldflags="-s -w -H=windowsgui" -o bing-tool.exe

      - name: UPX 极致体积压缩
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest
          files: bing-tool.exe
          args: -9 

      - name: 发布成品
        uses: actions/upload-artifact@v4
        with:
          name: bing-final-tool
          path: bing-tool.exe
