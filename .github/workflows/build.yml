name: Build IME Switcher

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install dependencies
        shell: pwsh
        run: |
          go mod tidy

      - name: Install and Run rsrc (Resource Compiler)
        shell: pwsh
        run: |
          go install github.com/akavel/rsrc@latest
          $GOBIN = "$(go env GOPATH)\bin"
          
          # 自动检测你的图标在 ui/icons 还是 icons 目录下
          if (Test-Path "icons/app.ico") {
            & "$GOBIN\rsrc.exe" -manifest main.manifest -ico ui/icons/app.ico -o rsrc.syso
          } elseif (Test-Path "icons/app.ico") {
            & "$GOBIN\rsrc.exe" -manifest main.manifest -ico icons/app.ico -o rsrc.syso
          } else {
            Write-Error "找不到图标文件 (icons/app.ico 或 icons/app.ico)"
            exit 1
          }

      - name: Build EXE
        shell: pwsh
        run: |
          $env:CGO_ENABLED="0"
          $env:GOOS="windows"
          $env:GOARCH="amd64"          
          
          go build -ldflags="-s -w -H=windowsgui" -o ime-switcher.exe .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ime-switcher
          path: ime-switcher.exe
