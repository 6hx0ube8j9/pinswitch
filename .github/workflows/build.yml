on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境与缓存
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true  

      - name: 安装 go-winres 工具
        run: |
          go install github.com/tc-hib/go-winres@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
        shell: bash

      - name: 自动整理依赖与生成图标
        run: |
          # 🌟 使用 Go 官方标准的指令触发器，自动在云端执行图标注入
          go generate
          
          # 整理 go 依赖
          go mod tidy
        shell: bash

      - name: 编译 EXE 核心
        run: |
          # 编译成无 CMD 窗口的程序
          go build -ldflags="-H=windowsgui" -o bing-tool.exe

      - name: 发布成品
        uses: actions/upload-artifact@v4
        with:
          name: bing-final-tool
          path: bing-tool.exe
