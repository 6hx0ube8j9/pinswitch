name: 编译带高清图标版本

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: 安装图标资源工具
        # rsrc 依然是最稳妥的选择，关键在于如何使用它
        run: go install github.com/akavel/rsrc@latest

      - name: 准备依赖并注入高清资源
        run: |
          # 1. 初始化模块（如果已存在会跳过）
          go mod init webgo || echo "already initialized"
          
          # 2. 获取核心依赖
          go get github.com/energye/systray@latest
          go get github.com/pkg/browser@latest
          
          # 3. 生成资源文件
          # 重点：rsrc 会扫描 ico 里的所有图层（16, 32, 48, 256px）并打包
          rsrc -arch amd64 -ico icons/app.ico -o resource.syso
          
          # 4. 整理依赖
          go mod tidy

      - name: 编译 EXE (高清模式)
        # 核心改动：
        # - 不要写 main.go，直接 go build 才能完美融合 resource.syso
        # -ldflags 参数：
        #   -s -w 压缩体积
        #   -H=windowsgui 隐藏黑窗口
        run: go build -ldflags="-s -w -H=windowsgui" -o bing-tool.exe

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: BingTool_HD_Version
          path: bing-tool.exe
