name: 自动修复并编译Windows版

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 自动生成项目环境
        run: |
          # 1. 如果没有 go.mod 则初始化
          go mod init github.com/myuser/webgo
          # 2. 强制下载我们需要的特定库
          go get github.com/energye/systray
          go get github.com/pkg/browser
          # 3. 整理依赖
          go mod tidy

      - name: 编译 EXE
        # -H=windowsgui 确保没有黑窗口
        run: go build -ldflags="-H=windowsgui" -o bing-tool.exe main.go

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: windows-bing-tool
          path: bing-tool.exe
