name: 高清图标纯净编译版

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: 清理并编译资源文件
        shell: pwsh
        run: |
          # 彻底删除旧的残留，确保图标更新
          if (Test-Path "main.syso") { Remove-Item "main.syso" }
          # 将 rc 文件编译为 coff 格式的 syso
          windres -i main.rc -o main.syso -O coff

      - name: 构建 Go 程序
        run: |
          go mod tidy
          # -s -w 压缩体积，-H=windowsgui 隐藏控制台
          go build -ldflags="-s -w -H=windowsgui" -o bing-tool.exe

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: BingTool_HD_Release
          path: bing-tool.exe
