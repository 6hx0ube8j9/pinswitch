name: 极致高清方案

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 编译高清资源
        run: |
          # 使用官方 windres 工具，将 rc、ico、manifest 全部揉成一个资源包
          windres -i main.rc -o main.syso -O coff

      - name: 编译 EXE
        run: |
          go mod tidy
          # 注意：必须直接 go build，不能加 main.go
          go build -ldflags="-s -w -H=windowsgui" -o bing-tool.exe

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: BingTool_Ultimate_HD
          path: bing-tool.exe
